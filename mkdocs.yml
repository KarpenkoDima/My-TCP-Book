site_name: Полное руководство по TCP
site_description: От физического уровня и IP до TCP, CUBIC, BBR, QUIC и Windows Network Internals.

theme:
  name: material

  palette:
    primary: indigo
    accent: deep purple

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - tables

  - toc:
      permalink: true

  - pymdownx.details

  - pymdownx.highlight:
      anchor_linenums: true

  - pymdownx.inlinehilite

  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

  - pymdownx.tabbed:
      alternate_style: true

extra_javascript:
  - https://unpkg.com/mermaid/dist/mermaid.min.js
  - assets/javascripts/mermaid.js

nav:
  - Главная: index.md

  - Основы сетевого стека:
      - Модуль 1. Физический уровень и ядро: modules/Module-01-Physical-Layer-and-Kernel.md
      - Модуль 2. Internet Protocol: modules/Module-02-IP-Protocol.md
      - Модуль 3. TCP State Machine: modules/Module-03-TCP-State-Machine.md

  - Управление трафиком:
      - Модуль 4. Bufferbloat и Congestion Control: modules/Module-04-Congestion-Control.md
      - Модуль 5. Traffic Control, тюнинг и диагностика: modules/Module-05-Traffic-Control-Tuning-Diagnostics.md
      - Лабораторный стенд: modules/Lab-Setup.md

  - Архитектура приложений:
      - Модуль 6. Высокопроизводительные сетевые приложения: modules/Module-06-Application-Architecture.md
      - Модуль 7. QUIC и HTTP/3: modules/Module-07-QUIC-HTTP3.md

  - Windows Networking:
      - Модуль 8. Windows Server Network Stack: modules/Module-08-Windows-Network-Stack.md
      - Модуль 9. Windows Client Networking: modules/Module-09-Windows-Client-Networking.md

  - Лаборатории:
      - Модуль 10. EVE-NG и Chaos Engineering: modules/Module-10-EVE-NG-Lab.md
